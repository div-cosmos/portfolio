<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Divyanshu Verma</title>
    <!--
      GitHub Pages SPA redirect.
      GitHub Pages has no server-side rewrite, so a direct hit / refresh on a
      client route (e.g. /projects/devpulse) serves this 404 page. It encodes
      the requested path into a query string and bounces to the app root, where
      the small script in index.html decodes it back into a clean URL.
      Root user-site, so keep 0 path segments. See rafgraph/spa-github-pages.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
